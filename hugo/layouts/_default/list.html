{{ define "main" }}

<h1>{{ .Title }}</h1>

<div class="grid">
    {{ range .Pages.ByDate.Reverse }}
    <div class="card">
        <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        <p>{{ .Summary }}</p>
        <small>{{ .Date.Format "Jan 2, 2006" }}</small>
    </div>
    {{ end }}
</div>

{{ end }}
